<!-- Button trigger modal -->
<button hidden type="button" class="btn btn-primary" data-mdb-toggle="modal" data-mdb-target="#exampleModal_{{v.n}}"
  id='boton_modal_{{v.n}}'>
  Launch demo modal
</button>

<!-- Modal -->
<div class="modal fade" id="exampleModal_{{v.n}}" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">

  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content">
      <div class="modal-header pt-4 pb-4" onclick="$('.modal').modal('hide');">
        <button hidden id="cierramodal" type="button" class="btn btn-warning" data-mdb-dismiss="modal">
          <i class="far fa-arrow-alt-circle-left fa-lg"></i>
        </button>
        {% include 'FixedButton.html' %}
      </div>
       <div class="modal-body">
         <h1>{{v.content}}</h1>
        

        <!-- modal iframe -->
        <iframe src="{{v.link}}" id="frame" frameborder="0"
          style="position:absolute; top:0; left:0; bottom:0; right:0; width: 100%; height: 100%;"></iframe>
        <!-- modal iframe -->

      </div>

    </div>
  </div>
</div>
