    <script>
        var url_string = window.location.href; //window.location.href
        var url = new URL(url_string);
        var ref = url.searchParams.get("ref");
        var nv = url.searchParams.get("nv");

        var aa = parseInt(url.searchParams.get("a"));
        var mm = parseInt(url.searchParams.get("m"));
        var dd = parseInt(url.searchParams.get("d"));


        const a = new Date();
        const b = new Date(aa, mm, dd);

        if (a.getTime() > b.getTime()) { document.getElementById("fueraplazo").innerHTML = "!! OFERTA FUERA DE PLAZO "; document.querySelector('#enviar').disabled = true; }

        document.getElementById("proyecto").value = ref;
        document.getElementById("_subject").value = "COLECTIVO_" + ref;
        document.getElementById("ref").innerHTML = "Ref.: " + ref;
        document.getElementById("nv").innerHTML = "Deben asociarse al menos " + (Math.ceil(((parseInt(nv))) / 3)) + " vecinos.";
        document.getElementById("aref").href = "/p/" + ref + ".pdf";
        document.getElementById("navbar_ref").innerHTML = "AUTOCONSUMO " + ref;
        document.getElementById("navbar_link").href = "/p/" + ref + ".pdf";

    </script>
